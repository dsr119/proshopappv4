<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling Pro Shop - Appointments</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0b0f1a;
            --surface:   #131929;
            --card:      #1a2235;
            --border:    #243047;
            --accent:    #3b82f6;
            --accent2:   #06b6d4;
            --text:      #e2e8f0;
            --muted:     #64748b;
            --subtle:    #334155;
            --success:   #10b981;
            --danger:    #ef4444;
            --weekend:   rgba(59,130,246,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 28px 20px 110px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .page-header .subtitle {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── CALENDAR SHELL ── */
        .calendar-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        /* Month nav bar */
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }
        .cal-nav-btn {
            background: var(--border);
            border: none;
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }
        .cal-nav-btn:hover { background: var(--subtle); transform: scale(1.08); }
        .cal-month-label {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Day-of-week header */
        .cal-dow {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 1px solid var(--border);
        }
        .cal-dow span {
            text-align: center;
            padding: 10px 0;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        /* Grid of day cells */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .cal-cell {
            min-height: 82px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 8px 8px 6px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            overflow: hidden;
        }
        .cal-cell:nth-child(7n) { border-right: none; }
        .cal-cell.weekend { background: var(--weekend); }
        .cal-cell:hover:not(.empty) { background: rgba(59,130,246,0.1); }
        .cal-cell.selected {
            background: rgba(59,130,246,0.18) !important;
            outline: 2px solid var(--accent);
            outline-offset: -2px;
            border-radius: 2px;
        }
        .cal-cell.empty { cursor: default; background: rgba(0,0,0,0.15); }
        .cal-cell.today .day-num {
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            padding: 1px 5px;
        }
        .cal-cell.past { opacity: 0.45; }

        .day-num {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            display: inline-block;
            margin-bottom: 4px;
        }

        /* Name chips */
        .appt-chip {
            display: block;
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: 0.03em;
            background: rgba(59,130,246,0.2);
            color: #93c5fd;
            border-radius: 4px;
            padding: 2px 5px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 2px solid var(--accent);
        }
        .appt-chip.more {
            background: rgba(100,116,139,0.2);
            color: var(--muted);
            border-left-color: var(--muted);
        }

        @media (max-width: 600px) {
            .cal-cell { min-height: 58px; padding: 5px 4px 4px; }
            .day-num { font-size: 11px; }
            .appt-chip { font-size: 8px; padding: 1px 3px; }
        }

        /* ── DAY DETAIL PANEL ── */
        .day-detail {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 28px;
            display: none;
            animation: slideDown 0.2s ease;
        }
        .day-detail.visible { display: block; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .day-detail h2 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--accent2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-detail h2 span.dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent2);
            display: inline-block;
        }

        .appt-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 10px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .appt-time-col {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            min-width: 72px;
            padding-top: 1px;
        }
        .appt-info-col { flex: 1; }
        .appt-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .appt-meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.7;
        }
        .appt-service {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
            font-style: italic;
        }

        .no-appts {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 20px 0;
            font-style: italic;
        }

        /* ── BOOKING FORM ── */
        .form-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .form-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 22px;
            color: var(--text);
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 7px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Mono', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        select option { background: var(--card); color: var(--text); }
        textarea { min-height: 80px; resize: vertical; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        .btn-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 13px 28px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-secondary {
            background: var(--subtle);
            color: var(--text);
            border: none;
            padding: 13px 22px;
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-secondary:hover { background: var(--border); }

        /* ── STATUS TOAST ── */
        #statusMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--success);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #statusMessage.show { transform: translateX(-50%) translateY(0); }
        #statusMessage.error { background: var(--danger); }

        /* ── LOADING SHIMMER ── */
        .shimmer {
            background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
            height: 14px;
            margin: 6px 0;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* ── FOOTER NAV ── */
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(11,15,26,0.96);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 14px 0;
            z-index: 1000;
        }
        .footer-nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            gap: 10px;
        }
        .footer-nav a {
            color: var(--muted);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            flex: 1;
            text-align: center;
            transition: color 0.2s, background 0.2s;
            letter-spacing: 0.04em;
        }
        .footer-nav a:hover { background: var(--card); color: var(--text); }
        .footer-nav a.active { background: var(--accent); color: #fff; }

        @media (max-width: 480px) {
            .footer-nav a { padding: 10px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>Appointments</h1>
        <span class="subtitle">Bowling Pro Shop</span>
    </div>

    <div id="statusMessage"></div>

    <!-- ── CALENDAR ── -->
    <div class="calendar-wrap">
        <div class="cal-nav">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
            <div class="cal-month-label" id="calMonthLabel"></div>
            <button class="cal-nav-btn" onclick="changeMonth(1)">&#8594;</button>
        </div>
        <div class="cal-dow">
            <span>Sun</span><span>Mon</span><span>Tue</span>
            <span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="cal-grid" id="calGrid">
            <!-- populated by JS -->
        </div>
    </div>

    <!-- ── DAY DETAIL ── -->
    <div class="day-detail" id="dayDetail">
        <h2><span class="dot"></span><span id="detailDateLabel">—</span></h2>
        <div id="detailList"></div>
    </div>

    <!-- ── BOOKING FORM ── -->
    <form id="appointmentForm">
        <div class="form-section">
            <h2>Schedule New Appointment</h2>

            <div class="form-row">
                <div class="form-group">
                    <label for="customerName">Customer Name *</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label for="customerPhone">Phone Number *</label>
                    <input type="text" id="customerPhone" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="location">Location *</label>
                    <select id="location" required>
                        <option value="">Select Location</option>
                        <option value="Valley Lanes">Valley Lanes</option>
                        <option value="South Side">South Side</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="apptDate">Appointment Date *</label>
                    <input type="date" id="apptDate" required>
                </div>
            </div>

            <div class="form-group">
                <label for="apptTime">Appointment Time *</label>
                <select id="apptTime" required disabled>
                    <option value="">Select a date first</option>
                </select>
            </div>

            <div class="form-group">
                <label for="serviceDescription">Service Description *</label>
                <textarea id="serviceDescription" required placeholder="What needs to be done?"></textarea>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn-primary">Schedule Appointment</button>
                <button type="button" class="btn-secondary" onclick="resetForm()">Clear</button>
            </div>
        </div>
    </form>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbypyk1y-Y1KZdvUmfje2Vc7b03EhHMoAiuuzi6_NJYooZdsShTX1ITLqV66q4ulnLXMTQ/exec';

        // ── State ──
        let currentYear, currentMonth;   // displayed month
        let allAppointments = {};        // keyed by "YYYY-MM-DD" → [{...}]
        let selectedDateStr = null;

        // ── Time slot generation ──
        const timeSlots = {
            1: genSlots('18:00','20:45',15),
            2: genSlots('18:00','20:45',15),
            3: genSlots('18:00','20:45',15),
            4: genSlots('18:00','20:45',15),
            6: genSlots('09:00','13:00',15),
            0: genSlots('16:00','20:30',15)
        };

        function genSlots(start, end, step) {
            const slots = [];
            let [h, m] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            while (h < eh || (h === eh && m <= em)) {
                const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
                const ap  = h >= 12 ? 'PM' : 'AM';
                slots.push({
                    display: `${h12}:${String(m).padStart(2,'0')} ${ap}`,
                    value:   `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`
                });
                m += step;
                if (m >= 60) { h++; m -= 60; }
            }
            return slots;
        }

        // ── Init ──
        window.onload = function () {
            const now = new Date();
            currentYear  = now.getFullYear();
            currentMonth = now.getMonth();
            loadMonthAppointments(currentYear, currentMonth);
        };

        // ── Load appointments for a month from the sheet ──
        function loadMonthAppointments(year, month) {
            const firstDay = `${year}-${String(month+1).padStart(2,'0')}-01`;
            const lastDay  = getLastDayOfMonth(year, month);
            renderCalendar(year, month, {});   // render immediately (empty)

            fetch(`${scriptUrl}?action=getAppointments&startDate=${firstDay}&endDate=${lastDay}`)
                .then(r => r.json())
                .then(data => {
                    allAppointments = {};
                    (data.appointments || []).forEach(a => {
                        if (!allAppointments[a.date]) allAppointments[a.date] = [];
                        allAppointments[a.date].push(a);
                    });
                    // Sort each day by time
                    Object.keys(allAppointments).forEach(d =>
                        allAppointments[d].sort((a,b) => a.time < b.time ? -1 : 1)
                    );
                    renderCalendar(year, month, allAppointments);
                    // Re-render detail if a date was selected
                    if (selectedDateStr) showDayDetail(selectedDateStr);
                })
                .catch(() => renderCalendar(year, month, {}));
        }

        function getLastDayOfMonth(year, month) {
            const d = new Date(year, month+1, 0);
            return `${year}-${String(month+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ── Render calendar grid ──
        function renderCalendar(year, month, appts) {
            const months = ['January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
            document.getElementById('calMonthLabel').textContent = `${months[month]} ${year}`;

            const grid  = document.getElementById('calGrid');
            grid.innerHTML = '';

            const today     = new Date();
            const todayStr  = dateStr(today);
            const firstDow  = new Date(year, month, 1).getDay();
            const daysInMon = new Date(year, month+1, 0).getDate();

            // Empty cells before 1st
            for (let i = 0; i < firstDow; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell empty';
                grid.appendChild(cell);
            }

            for (let d = 1; d <= daysInMon; d++) {
                const ds  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dow = new Date(year, month, d).getDay();
                const cell = document.createElement('div');
                cell.className = 'cal-cell'
                    + ([0,6].includes(dow) ? ' weekend' : '')
                    + (ds === todayStr    ? ' today'   : '')
                    + (ds === selectedDateStr ? ' selected' : '')
                    + (ds < todayStr      ? ' past'    : '');

                // Day number
                const num = document.createElement('span');
                num.className = 'day-num';
                num.textContent = d;
                cell.appendChild(num);

                // Name chips
                const dayAppts = appts[ds] || [];
                dayAppts.slice(0, 3).forEach(a => {
                    const chip = document.createElement('span');
                    chip.className = 'appt-chip';
                    const firstName = a.name.split(' ')[0];
                    chip.textContent = `${a.time ? a.time.replace(/:00/,'') + ' ' : ''}${firstName}`;
                    cell.appendChild(chip);
                });
                if (dayAppts.length > 3) {
                    const more = document.createElement('span');
                    more.className = 'appt-chip more';
                    more.textContent = `+${dayAppts.length - 3} more`;
                    cell.appendChild(more);
                }

                cell.addEventListener('click', () => handleDayClick(ds));
                grid.appendChild(cell);
            }
        }

        // ── Day click ──
        function handleDayClick(ds) {
            selectedDateStr = ds;
            // Update selected styling
            document.querySelectorAll('.cal-cell.selected').forEach(c => c.classList.remove('selected'));
            // Re-render to apply selection (cheap)
            renderCalendar(currentYear, currentMonth, allAppointments);
            showDayDetail(ds);
        }

        function showDayDetail(ds) {
            const detail  = document.getElementById('dayDetail');
            const label   = document.getElementById('detailDateLabel');
            const list    = document.getElementById('detailList');
            const dateObj = new Date(ds + 'T00:00:00');
            label.textContent = dateObj.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
            detail.classList.add('visible');
            list.innerHTML = '';

            const dayAppts = allAppointments[ds] || [];
            if (dayAppts.length === 0) {
                list.innerHTML = '<p class="no-appts">No appointments on this day.</p>';
                return;
            }
            dayAppts.forEach(a => {
                const card = document.createElement('div');
                card.className = 'appt-card';
                card.innerHTML = `
                    <div class="appt-time-col">${a.time || '—'}</div>
                    <div class="appt-info-col">
                        <div class="appt-name">${a.name}</div>
                        <div class="appt-meta">${a.phone} &nbsp;·&nbsp; ${a.location}</div>
                        <div class="appt-service">${a.service}</div>
                    </div>`;
                list.appendChild(card);
            });

            // Pre-fill form date
            document.getElementById('apptDate').value = ds;
            const dow = new Date(ds + 'T00:00:00').getDay();
            updateTimeSlots(dow);
            detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ── Month navigation ──
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
            selectedDateStr = null;
            document.getElementById('dayDetail').classList.remove('visible');
            loadMonthAppointments(currentYear, currentMonth);
        }

        // ── Time slots ──
        document.getElementById('apptDate').addEventListener('change', function () {
            if (!this.value) return;
            const dow = new Date(this.value + 'T00:00:00').getDay();
            updateTimeSlots(dow);
            // Keep calendar in sync if form date changes
            const [y, m] = this.value.split('-').map(Number);
            if (y !== currentYear || m-1 !== currentMonth) {
                currentYear = y; currentMonth = m-1;
                loadMonthAppointments(currentYear, currentMonth);
            }
            selectedDateStr = this.value;
            renderCalendar(currentYear, currentMonth, allAppointments);
            showDayDetail(this.value);
        });

        function updateTimeSlots(dow) {
            const sel = document.getElementById('apptTime');
            sel.innerHTML = '';
            if (timeSlots[dow]) {
                sel.disabled = false;
                sel.appendChild(Object.assign(document.createElement('option'), {value:'', textContent:'Select time'}));
                timeSlots[dow].forEach(s => {
                    sel.appendChild(Object.assign(document.createElement('option'), {value: s.value, textContent: s.display}));
                });
            } else {
                sel.disabled = true;
                sel.appendChild(Object.assign(document.createElement('option'), {value:'', textContent:'No availability this day'}));
            }
        }

        // ── Form ──
        function resetForm() {
            document.getElementById('appointmentForm').reset();
            document.getElementById('apptTime').disabled = true;
            showMessage('Form cleared', false);
        }

        function showMessage(msg, isError) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = isError ? 'error show' : 'show';
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                name:     document.getElementById('customerName').value,
                phone:    document.getElementById('customerPhone').value,
                location: document.getElementById('location').value,
                apptDate: document.getElementById('apptDate').value,
                apptTime: document.getElementById('apptTime').value,
                service:  document.getElementById('serviceDescription').value
            };
            fetch(scriptUrl, {
                method: 'POST',
                mode:   'no-cors',
                headers: {'Content-Type':'application/json'},
                body:   JSON.stringify(data)
            })
            .then(() => {
                showMessage('Appointment scheduled!', false);
                // Optimistically add to local cache
                if (!allAppointments[data.apptDate]) allAppointments[data.apptDate] = [];
                const h = parseInt(data.apptTime.split(':')[0]);
                const mn = data.apptTime.split(':')[1];
                const h12 = h > 12 ? h-12 : (h===0?12:h);
                const ap  = h >= 12 ? 'PM' : 'AM';
                allAppointments[data.apptDate].push({
                    name: data.name, phone: data.phone,
                    location: data.location, service: data.service,
                    date: data.apptDate,
                    time: `${h12}:${mn} ${ap}`
                });
                allAppointments[data.apptDate].sort((a,b) => a.time < b.time ? -1 : 1);
                renderCalendar(currentYear, currentMonth, allAppointments);
                if (selectedDateStr === data.apptDate) showDayDetail(data.apptDate);
                resetForm();
            })
            .catch(() => showMessage('Error scheduling. Please try again.', true));
        });

        // ── Helpers ──
        function dateStr(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
    </script>
